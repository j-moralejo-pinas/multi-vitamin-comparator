name: release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release: auto, major, minor, or patch (default: auto)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - major
          - minor
          - patch

permissions:
  contents: write
  pull-requests: write

jobs:
  call-reusable:
    uses: j-moralejo-pinas/ci-cd-python/.github/workflows/release.yml@main
    with:
      release_type: ${{ inputs.release_type || 'auto' }}
    secrets: inherit
